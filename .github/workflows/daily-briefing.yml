name: Daily Edge Zero Briefing

on:
  schedule:
    - cron: '0 13 * * *'    # 8 AM CDT
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run briefing script
        run: python daily_briefing.py
