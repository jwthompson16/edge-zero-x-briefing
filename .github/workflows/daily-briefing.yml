name: Daily Edge Zero Briefing

on:
  schedule:
    - cron: '0 13 * * *'    # 8 AM CDT
  workflow_dispatch:        # Manual test

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install openai
      
      - name: Run briefing script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python daily_briefing.py
      
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: Edge Zero Daily X Briefing - ${{ env.DATE }}
          body: file://briefing.md
          to: ${{ secrets.TO_EMAIL }}
          from: Edge Zero Bot <${{ secrets.EMAIL_USER }}>
